<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        /* 导航栏样式 */
        nav {
            background: #333;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin-right: 1rem;
            text-decoration: none;
            cursor: pointer;
        }
        nav a:hover {
            text-decoration: underline;
        }
        /* 按钮样式 */
        .btn {
            padding: 0.5rem 1rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:active {
            background: #0056b3;
        }
        /* 加载动画 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            padding-top: 20%;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <a href="index.html">首页</a>
        <a href="product-list.html">商品列表</a>
        <a href="product-detail.html">商品详情</a>
        <a href="user-center.html">个人中心</a>
    </nav>

    <h1>首页基础结构</h1>
    <button class="btn" onclick="handleClick()">点击我查看反馈</button>

    <!-- 加载状态 -->
    <div class="loading" id="loading">加载中...</div>

    <script>
        // 按钮点击反馈
        function handleClick() {
            alert('按钮已点击！');
        }

        // 模拟页面加载
        window.addEventListener('load', function() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            setTimeout(() => {
                loading.style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
