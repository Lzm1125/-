<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表页</title>
    <style>
        /* 导航栏样式 */
        nav {
            background: #333;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin-right: 1rem;
            text-decoration: none;
            cursor: pointer;
        }
        nav a:hover {
            text-decoration: underline;
        }
        /* 商品列表样式 */
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .product-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-card h3 {
            margin: 0 0 10px;
        }
        .product-card .price {
            color: #ff5722;
            font-weight: bold;
        }
        /* 加载和刷新样式 */
        .loading, .refresh-hint {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .refresh-hint {
            display: none;
            background: #f5f5f5;
        }
        .btn {
            padding: 0.5rem 1rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:active {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        首页
        商品列表
        发布商品
        商品详情
        个人中心
        登录
    </nav>

    <div class="refresh-hint" id="refreshHint">下拉刷新...</div>
    <div class="loading" id="loading">加载中...</div>
    <div class="product-list" id="productList"></div>
    <div style="text-align: center; padding: 20px;">
        <button class="btn" id="loadMore">加载更多</button>
    </div>

    <script>
        let page = 1;
        let isLoading = false;
        let startTouchY = 0;

        // 页面加载时获取第一页数据
        window.addEventListener('load', () => {
            fetchProducts();
            checkLoginStatus();
        });

        // 下拉刷新监听
        document.addEventListener('touchstart', (e) => {
            startTouchY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const endTouchY = e.changedTouches[0].clientY;
            if (endTouchY - startTouchY > 100 && window.scrollY === 0) {
                refreshProducts();
            }
        });

        // 刷新商品列表
        function refreshProducts() {
            const hint = document.getElementById('refreshHint');
            hint.style.display = 'block';
            page = 1;
            fetchProducts().finally(() => {
                hint.style.display = 'none';
            });
        }

        // 加载更多商品
        document.getElementById('loadMore').addEventListener('click', () => {
            page++;
            fetchProducts();
        });

        // 调用后端接口获取商品列表
        async function fetchProducts() {
            if (isLoading) return;
            isLoading = true;
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                const res = await fetch(`/api/item/list?page=${page}&limit=10`);
                const data = await res.json();

                if (res.ok) {
                    renderProducts(data.items);
                } else {
                    alert('获取商品列表失败：' + data.msg);
                }
            } catch (err) {
                console.error(err);
                alert('网络错误，请重试');
            } finally {
                isLoading = false;
                loading.style.display = 'none';
            }
        }

        // 渲染商品卡片
        function renderProducts(products) {
            const list = document.getElementById('productList');
            if (page === 1) list.innerHTML = ''; // 刷新时清空列表

            products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${item.name}</h3>
                    <p>${item.description}</p >
                    <div class="price">¥${item.price}</div>
                `;
                // 点击跳转到商品详情页
                card.addEventListener('click', () => {
                    window.location.href = `product-detail.html?id=${item.id}`;
                });
                list.appendChild(card);
            });
        }

        // 检查登录状态
        function checkLoginStatus() {
            const userInfo = localStorage.getItem('userInfo');
            const loginLink = document.getElementById('loginLink');
            if (userInfo) {
                loginLink.textContent = '个人中心';
                loginLink.href = 'user-center.html';
            }
        }
    </script>
</body>
</html>
