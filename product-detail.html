<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情页</title>
    <style>
        /* 导航栏样式 */
        nav {
            background: #333;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin-right: 1rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        /* 详情页样式 */
        .detail-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }
        .product-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .product-image {
            width: 300px;
            height: 300px;
            border: 1px solid #ddd;
            border-radius: 8px;
            object-fit: cover;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        .product-info h1 {
            margin-top: 0;
        }
        .price {
            font-size: 24px;
            color: #ff5722;
            font-weight: bold;
            margin: 10px 0;
        }
        .seller-info {
            color: #666;
            margin: 10px 0;
            padding: 10px;
            background: #f8f8f8;
            border-radius: 4px;
        }
        .description {
            line-height: 1.6;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        /* 按钮与加载样式 */
        .btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:active {
            background: #0056b3;
        }
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            padding-top: 20%;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        首页
        商品列表
        发布商品
        个人中心
        登录
    </nav>

    <div class="loading" id="loading">加载中...</div>

    <!-- 商品详情容器 -->
    <div class="detail-container" id="detailContainer">
        <!-- 内容将由JS动态渲染 -->
    </div>

    <script>
        // 页面加载后执行
        window.addEventListener('load', async () => {
            checkLoginStatus();
            await loadProductDetail();
        });

        // 1. 从URL获取商品ID并调用接口
        async function loadProductDetail() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('detailContainer');
            
            // 获取URL中的商品ID
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            // 校验ID
            if (!productId) {
                container.innerHTML = '<h2>错误：未找到商品ID</h2><p>请从商品列表页进入。</p >';
                return;
            }

            // 显示加载
            loading.style.display = 'block';

            try {
                // 调用后端详情接口
                const response = await fetch(`/api/item/detail/${productId}`);
                const data = await response.json();

                if (response.ok) {
                    // 2. 渲染商品信息
                    renderDetail(data);
                } else {
                    container.innerHTML = `<h2>加载失败</h2><p>${data.msg || '服务器错误'}</p >`;
                }
            } catch (error) {
                console.error('接口请求失败:', error);
                container.innerHTML = '<h2>网络错误</h2><p>请检查网络连接后重试。</p >';
            } finally {
                // 隐藏加载
                loading.style.display = 'none';
            }
        }

        // 3. 渲染商品详情HTML
        function renderDetail(product) {
            const container = document.getElementById('detailContainer');
            // 拼接HTML，包含卖家信息、价格、描述、图片、联系按钮
            container.innerHTML = `
                <div class="product-header">
                    < img class="product-image" 
                         src="${product.image || 'https://via.placeholder.com/300?text=暂无图片'}" 
                         alt="${product.name}">
                    <div class="product-info">
                        <h1>${product.name}</h1>
                        <div class="price">¥${product.price.toFixed(2)}</div>
                        <div class="seller-info">
                            <strong>发布者：</strong>${product.sellerName || '匿名用户'}<br>
                            <strong>发布时间：</strong>${new Date(product.createTime).toLocaleString()}
                        </div>
                        <!-- 3. 联系卖家按钮 -->
                        <button class="btn" onclick="contactSeller('${product.sellerContact}')">联系卖家</button>
                    </div>
                </div>
                <div class="description">
                    <h3>商品描述</h3>
                    <p>${product.description || '该卖家未填写描述。'}</p >
                </div>
            `;
        }

        // 4. 联系卖家功能（模拟跳转或复制）
        function contactSeller(contact) {
            if (!contact) {
                alert('卖家未提供联系方式！');
                return;
            }
            // 模拟：复制到剪贴板或跳转
            navigator.clipboard.writeText(contact).then(() => {
                alert(`联系方式已复制：\n${contact}`);
                // 若需跳转聊天，可使用: window.location.href = `chat://${contact}`;
            }).catch(() => {
                alert(`卖家联系方式：\n${contact}\n请手动记录。`);
            });
        }

        // 检查登录状态
        function checkLoginStatus() {
            const userInfo = localStorage.getItem('userInfo');
            const loginLink = document.getElementById('loginLink');
            if (userInfo) {
                loginLink.textContent = '个人中心';
                loginLink.href = 'user-center.html';
            }
        }
    </script>
</body>
</html>
