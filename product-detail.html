<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情页</title>
    <style>
        /* 导航栏样式 */
        nav {
            background: #333;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin-right: 1rem;
            text-decoration: none;
            cursor: pointer;
        }
        nav a:hover {
            text-decoration: underline;
        }
        /* 按钮样式 */
        .btn {
            padding: 0.5rem 1rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:active {
            background: #218838;
        }
        /* 加载动画 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            padding-top: 20%;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <a href="index.html">首页</a>
        <a href="product-list.html">商品列表</a>
        <a href="product-detail.html">商品详情</a>
        <a href="user-center.html">个人中心</a>
    </nav>

    <h1>商品详情页基础结构</h1>
    <button class="btn" onclick="handleClick()">加入购物车</button>

    <!-- 加载状态 -->
    <div class="loading" id="loading">加载中...</div>

    <script>
        // 按钮点击反馈
        function handleClick() {
            alert('商品已加入购物车！');
        }

        // 模拟页面加载
        window.addEventListener('load', function() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            setTimeout(() => {
                loading.style.display = 'none';
            }, 1000);
        }
                               window.addEventListener('load', function() {
    // 从 URL 获取商品 ID
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    if (productId) {
        fetchProductDetail(productId);
    }

    // 模拟加载状态
    const loading = document.getElementById('loading');
    loading.style.display = 'block';
    setTimeout(() => {
        loading.style.display = 'none';
    }, 1000);
});

// 调用后端接口获取商品详情
async function fetchProductDetail(id) {
    try {
        const res = await fetch(`/api/item/detail?id=${id}`);
        const data = await res.json();
        if (res.ok) {
            // 渲染商品详情
            document.querySelector('h1').textContent = data.name;
            // 其他字段渲染...
        } else {
            alert('获取商品详情失败：' + data.msg);
        }
    } catch (err) {
        console.error(err);
        alert('网络错误，请重试');
    }
});
    </script>
</body>
</html>
