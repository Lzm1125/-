<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心页</title>
    <style>
        /* 导航栏样式 */
        nav {
            background: #333;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin-right: 1rem;
            text-decoration: none;
            cursor: pointer;
        }
        nav a:hover {
            text-decoration: underline;
        }
        /* 个人中心样式 */
        .profile-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }
        .user-info {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .user-info h2 {
            margin-top: 0;
        }
        .user-info p {
            color: #666;
            line-height: 1.6;
        }
        .btn {
            padding: 0.5rem 1rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 10px;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:active {
            background: #c82333;
        }
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .product-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-card h3 {
            margin: 0 0 10px;
        }
        .product-card .price {
            color: #ff5722;
            font-weight: bold;
        }
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            padding-top: 20%;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        首页
        商品列表
        发布商品
        个人中心
        登录
    </nav>

    <div class="profile-container">
        <div class="user-info" id="userInfo">
            <!-- 用户信息将由JS动态渲染 -->
        </div>

        <h3>已发布商品</h3>
        <div class="product-list" id="publishedProducts">
            <!-- 商品列表将由JS动态渲染 -->
        </div>
    </div>

    <div class="loading" id="loading">加载中...</div>

    <script>
        // 页面加载时获取用户信息和已发布商品
        window.addEventListener('load', async () => {
            checkLoginStatus();
            await loadUserProfile();
        });

        // 检查登录状态
        function checkLoginStatus() {
            const userInfo = localStorage.getItem('userInfo');
            const loginLink = document.getElementById('loginLink');
            if (userInfo) {
                loginLink.textContent = '个人中心';
                loginLink.href = 'user-center.html';
            } else {
                // 未登录则跳转到登录页
                alert('请先登录！');
                window.location.href = 'login.html';
            }
        }

        // 调用后端接口获取用户信息和已发布商品
        async function loadUserProfile() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                // 从本地存储获取用户ID（或从token中解析）
                const userInfo = JSON.parse(localStorage.getItem('userInfo'));
                const userId = userInfo.id;

                // 获取用户信息
                const userRes = await fetch(`/api/user/profile/${userId}`);
                const userData = await userRes.json();

                // 获取已发布商品
                const productsRes = await fetch(`/api/user/published/${userId}`);
                const productsData = await productsRes.json();

                if (userRes.ok && productsRes.ok) {
                    renderUserInfo(userData);
                    renderPublishedProducts(productsData.items);
                } else {
                    alert('获取个人信息失败：' + (userData.msg || productsData.msg));
                }
            } catch (err) {
                console.error(err);
                alert('网络错误，请重试');
            } finally {
                loading.style.display = 'none';
            }
        }

        // 渲染用户信息
        function renderUserInfo(user) {
            const userInfoDiv = document.getElementById('userInfo');
            userInfoDiv.innerHTML = `
                <h2>欢迎回来，${user.username}！</h2>
                <p><strong>账号：</strong>${user.account}</p >
                <p><strong>简介：</strong>${user.bio || '这个人很懒，什么都没写~'}</p >
                <button class="btn" onclick="editProfile()">编辑个人资料</button>
                <button class="btn btn-danger" onclick="logout()">退出登录</button>
            `;
        }

        // 渲染已发布商品列表
        function renderPublishedProducts(products) {
            const list = document.getElementById('publishedProducts');
            if (products.length === 0) {
                list.innerHTML = '<p>您还没有发布任何商品。</p >';
                return;
            }

            products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${item.name}</h3>
                    <p>${item.description}</p >
                    <div class="price">¥${item.price}</div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = `product-detail.html?id=${item.id}`;
                });
                list.appendChild(card);
            });
        }

        // 编辑个人资料（跳转到编辑页）
        function editProfile() {
            window.location.href = 'edit-profile.html';
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('userInfo'); // 清除本地用户信息
                alert('已退出登录');
                window.location.href = 'login.html'; // 跳转到登录页
            }
        }
    </script>
</body>
</html>
